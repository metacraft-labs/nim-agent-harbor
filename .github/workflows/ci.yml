name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: metacraft-labs/nim-everywhere
          path: ../nim-everywhere
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test 2>&1 | tee test.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-log-${{ matrix.runner }}
          path: test.log
  lint:
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: metacraft-labs/nim-everywhere
          path: ../nim-everywhere
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just lint 2>&1 | tee lint.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-log-${{ matrix.runner }}
          path: lint.log
  nix-build:
    strategy:
      fail-fast: false
      matrix:
        runner: [incus, tart-linux-arm, macos-tart]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build .#default 2>&1 | tee nix-build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nix-build-log-${{ matrix.runner }}
          path: nix-build.log
